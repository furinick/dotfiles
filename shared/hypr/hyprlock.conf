$font = Noto Sans

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = rgba(0, 0, 0, 1.0)
}

# clock
label {
    # monitor = DP-1
    text = $TIME
    font_size = 72
    font_family = $font
    color = rgba(255, 255, 255, 1.0)
    halign = center
    valign = top
}

# face
label {
    # monitor = DP-1
    text = cmd[update:1000] ~/dotfiles/shared/hypr/scripts/face.sh
    font_size = 42
    font_family = $font
    color = rgba(255, 255, 255, 1.0)
    position = 0, 0
    halign = center
    valign = center
}

# password field sits at the 2/3 line
input-field {
    # monitor = DP-1
    size = 20%, 5%
    outline_thickness = 1
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(255, 255, 255, 0.15)
    font_color = rgb(200, 200, 200)
    font_family = $font
    placeholder_text =
    fail_text = x _ x
    check_text =
    fade_on_empty = false
    rounding = 8
    dots_spacing = 0.3
    hide_input = true
    position = 0, -25%
    halign = center
    valign = center
}
