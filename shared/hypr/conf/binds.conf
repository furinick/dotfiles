###################
### KEYBINDINGS ###
###################
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER

# Apps
bind = $mainMod,        Q,           exec,                        $terminal
bind = $mainMod,        E,           exec,                        $fileManager
bind = $mainMod,        Space,       exec,                        $menu
bind = $mainMod,        B,           exec,                        $browser
bind = $mainMod CONTROL,V,           exec,                        walker -m clipboard

# Window management
bind = $mainMod,       C,           killactive,
bind = $mainMod,       F,           fullscreen,
bind = $mainMod,       V,           togglefloating,

# Exit/shutdown
bind = $mainMod,       M,           exec,                        command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Move focus — arrow keys
bind = $mainMod,       left,        movefocus,                   l
bind = $mainMod,       right,       movefocus,                   r
bind = $mainMod,       up,          movefocus,                   u
bind = $mainMod,       down,        movefocus,                   d

# Move focus — vim keys
bind = $mainMod,       H,           movefocus,                   l
bind = $mainMod,       L,           movefocus,                   r
bind = $mainMod,       K,           movefocus,                   u
bind = $mainMod,       J,           movefocus,                   d

# Move windows — vim keys
bind = $mainMod SHIFT, H,           movewindow,                  l
bind = $mainMod SHIFT, L,           movewindow,                  r
bind = $mainMod SHIFT, K,           movewindow,                  u
bind = $mainMod SHIFT, J,           movewindow,                  d

# Resize windows — vim keys
bind = $mainMod ALT,   H,           resizeactive,               -50 0
bind = $mainMod ALT,   L,           resizeactive,                50 0
bind = $mainMod ALT,   K,           resizeactive,                0 -50
bind = $mainMod ALT,   J,           resizeactive,                0  50

# Workspaces
bind = $mainMod,       1,           split-workspace,             1
bind = $mainMod,       2,           split-workspace,             2
bind = $mainMod,       3,           split-workspace,             3
bind = $mainMod,       4,           split-workspace,             4
bind = $mainMod,       5,           split-workspace,             5

# Move active window to workspace
bind = $mainMod SHIFT, 1,           split-movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2,           split-movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3,           split-movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4,           split-movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5,           split-movetoworkspacesilent, 5

# Scratchpad
bind = $mainMod,       S,           togglespecialworkspace,      magic
bind = $mainMod SHIFT, S,           movetoworkspace,             special:magic

# Floating kitty
bind = $mainMod,       T,           exec,                        kitty --class kitty-float

# Mouse
bind  = $mainMod,      mouse_down,  workspace,                   e+1
bind  = $mainMod,      mouse_up,    workspace,                   e-1
bindm = $mainMod,      mouse:272,   movewindow
bindm = $mainMod,      mouse:273,   resizewindow

# Minimize
bind = $mainMod,       N,           togglespecialworkspace,      minimize
bind = $mainMod,       N,           movetoworkspace,             +0
bind = $mainMod,       N,           togglespecialworkspace,      minimize
bind = $mainMod,       N,           movetoworkspace,             special:minimize
bind = $mainMod,       N,           togglespecialworkspace,      minimize

# Audio
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Screenshots
bind = ,                Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod,        Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '.at[0],.at[1],.size[0],.size[1]' | tr '\n' ' ' | awk '{print $1","$2" "$3"x"$4}')" - | wl-copy
bind = SHIFT,           Print, exec, grim -g "$(slurp)" ~/Imagens/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod SHIFT,  Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '.at[0],.at[1],.size[0],.size[1]' | tr '\n' ' ' | awk '{print $1","$2" "$3"x"$4}')" ~/Imagens/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png

# Color picker
bind = $mainMod, P, exec, hyprpicker -a

# Gamemode
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
